[project]
name = "harness-models"
version = "0.0.0"
description = "SQLAlchemy ORM + Pydantic DTOs for the harness racing platform"
requires-python = ">=3.12"
dependencies = [
  "sqlalchemy>=2.0.36",
  "pydantic>=2.10.0",
  "psycopg[binary]>=3.2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-cov>=6.0.0",
  "ruff>=0.7.0",
  "mypy>=1.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness_models"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
