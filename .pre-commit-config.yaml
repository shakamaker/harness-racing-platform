# pre-commit — fast, local-machine checks that fire on every `git commit`.
#
# This is the first line of defence against the most common security own-goals
# (committed .env files, leaked AWS keys, private SSH keys, etc.) — the kind
# of thing that has to never reach a public branch, because rewriting history
# after the fact does not undo the credential exposure. Pair with Trivy /
# Dependabot, which run server-side at PR time.
#
# Install once per dev machine:
#   uv tool install pre-commit          # or pipx install pre-commit
#   pre-commit install                  # writes .git/hooks/pre-commit
#   pre-commit install --hook-type commit-msg
#
# Run on the full repo at any time:
#   pre-commit run --all-files
#
# CI integration is via pre-commit.ci (free for public repos) or the
# `pre-commit/action` GitHub Action — kept out of this file deliberately so
# this config is the single source of truth for local + CI hooks.

# All third-party hooks pin a full SHA-pinned tag (Dependabot updates these).
default_language_version:
  python: python3.12

default_stages: [pre-commit]

repos:
  # ---------------------------------------------------------------------------
  # File hygiene — basic safety nets shipped with pre-commit itself.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
        args: ["--unsafe"]   # docker-compose uses !reset etc.
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  # ---------------------------------------------------------------------------
  # Secret scanning — two independent tools (defence-in-depth).
  # gitleaks is fast and broad; detect-secrets has per-file baselines and
  # catches things gitleaks misses (and vice-versa).
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
              \.secrets\.baseline|
              uv\.lock|
              pnpm-lock\.yaml|
              package-lock\.json
          )$

  # ---------------------------------------------------------------------------
  # Python — ruff covers lint + format. Mirror the workspace pyproject.toml
  # config so what runs locally matches what runs in CI.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # JS/TS/JSON/YAML/Markdown — prettier formatting for the frontend lane.
  # Scoped to apps/web/ + docs/ to keep it cheap.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^(apps/web/|docs/|.*\.md$|.*\.ya?ml$|.*\.json$)
        exclude: |
          (?x)^(
              pnpm-lock\.yaml|
              .*\.min\.js|
              .*/dist/.*|
              .*/node_modules/.*
          )$

  # ---------------------------------------------------------------------------
  # Shell scripts — shellcheck is a hard requirement for any scripts we ship
  # (scraper bootstrap, CI helpers).
  # ---------------------------------------------------------------------------
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck

  # ---------------------------------------------------------------------------
  # Conventional Commits — enforces the commit-message style required by
  # CLAUDE.md §3.2 (feat:, fix:, chore:, docs:). Runs at commit-msg stage.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ["feat", "fix", "chore", "docs", "refactor", "perf", "test", "build", "ci", "style", "revert"]
