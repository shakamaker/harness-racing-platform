name: harness-racing-platform

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness_dev
      POSTGRES_DB: harness
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
